# One-off BNP Paribas scraper - relance BNP uniquement sans toucher aux autres sources
# 1. Restaure la DB du run precedent (delta scraping - backlog de details)
# 2. Scrape BNP uniquement
# 3. Sauvegarde la DB en cache (if: always -> meme si le scraper plante)
# 4. Fusionne dans scraped_jobs_live.json
# 5. Commit et push -> BNP dispo sur Taleos immediatement

name: One-off BNP Paribas scraper

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  bnp-only:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dependances
        run: |
          pip install -r PYTHON/requirements_scrapers.txt
          playwright install chromium firefox
          playwright install-deps chromium
          playwright install-deps firefox

      - name: Restaurer la base SQLite (cache inter-runs)
        id: cache-db-restore
        uses: actions/cache/restore@v4
        with:
          path: PYTHON/bnp_paribas_jobs.db
          key: scraper-db-bnp_paribas-${{ github.run_id }}
          restore-keys: |
            scraper-db-bnp_paribas-

      - name: Diagnostiquer l'etat de la DB restauree
        run: |
          if [ -f PYTHON/bnp_paribas_jobs.db ]; then
            echo "DB restauree — taille: $(stat -c%s PYTHON/bnp_paribas_jobs.db) octets"
            python3 -c "import sqlite3; conn = sqlite3.connect('PYTHON/bnp_paribas_jobs.db'); has=conn.execute(\"SELECT name FROM sqlite_master WHERE type='table' AND name='jobs'\").fetchone(); t=conn.execute('SELECT COUNT(*) FROM jobs WHERE status=\"Live\" AND is_valid=1').fetchone()[0] if has else 0; d=conn.execute('SELECT COUNT(*) FROM jobs WHERE status=\"Live\" AND is_valid=1 AND job_description IS NOT NULL AND TRIM(job_description)!=\"\"').fetchone()[0] if has else 0; print(f'Live: {t}  Avec description: {d}  Backlog: {t-d}'); conn.close()"
          else
            echo "Pas de DB en cache — demarrage a zero"
          fi

      - name: Scraper BNP Paribas uniquement
        run: cd PYTHON && python bnp_paribas_scraper.py

      - name: Sauvegarder la base SQLite en cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: PYTHON/bnp_paribas_jobs.db
          key: scraper-db-bnp_paribas-${{ github.run_id }}

      - name: Fusion BNP dans le JSON existant
        run: cd PYTHON && python merge_bnp_into_json.py

      - name: Stats BNP Paribas
        run: cd PYTHON && python show_job_stats.py

      - name: Commit et push des mises a jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HTML/scraped_jobs_live.json HTML/scraped_jobs.json
          if git diff --staged --quiet; then
            echo "Aucun changement a committer"
            exit 0
          fi
          git commit -m "chore: mise a jour offres BNP Paribas (one-off)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push echoue (tentative $i/3), nouvelle tentative dans 10s..."
            git rebase --abort 2>/dev/null || true
            sleep 10
          done
          echo "Impossible de pousser apres 3 tentatives"
          exit 1
