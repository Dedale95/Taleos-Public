/* ── HOOKS ── */
function useReveal(delay = 0) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setTimeout(() => el.classList.add('in-view'), delay); obs.disconnect(); }
    }, { threshold: 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [delay]);
  return ref;
}

/* ── SHARED COMPONENTS ── */

        <svg width={size * 0.56} height={size * 0.56} viewBox="0 0 36 36" fill="none">

          <path d="M16 14V26" stroke={mainColor} strokeWidth="2.5" strokeLinecap="round"/>

}

function buildAuthHref(mode = 'signup', email = '') {
  const params = new URLSearchParams();
  if (mode) params.set('mode', mode);
  if (email && email.trim()) params.set('email', email.trim());
  return `${AUTH_PAGE_PATH}?${params.toString()}`;
}

function openAuth(mode = 'signup', email = '') {
  window.location.href = buildAuthHref(mode, email);
}

function Tag({ type, children }) {
  const { bg, color } = TAGS[type] || TAGS.family;
  return <span style={{ display:'inline-block', padding:'4px 10px', borderRadius:2, fontSize:12, fontWeight:500, background:bg, color, whiteSpace:'nowrap' }}>{children}</span>;
}

function CompanyLogo({ domain, name, size = 36 }) {
  const [err, setErr] = useState(false);
  return (
    <div style={{ width:size, height:size, borderRadius:8, background:WHITE, border:`1px solid ${BORDER}`, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', flexShrink:0, padding:5 }}>
      {err
        ? <span style={{ fontSize:9, fontWeight:700, color:MUTED, textAlign:'center', lineHeight:1.2 }}>{name.split(' ').map(w=>w[0]).slice(0,2).join('')}</span>
        : <img src={`https://logo.clearbit.com/${domain}`} alt={name} style={{ width:'100%', height:'100%', objectFit:'contain' }} onError={() => setErr(true)} />
      }
    </div>
  );
}

/* ── NAV ── */
function Nav({ onSignup }) {

  );

/* ── TRUST BAND — infinite marquee ── */
const LOGO_LIST = Object.entries(LANDING_COMPANY_LOGOS).map(([name, path]) => ({ name, path }));

function LogoItem({ name, path }) {
  const [err, setErr] = useState(false);
  if (!path || err) return null;
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, minWidth:146, height:56, padding:'0 22px' }}>
      <img src={path} alt={name} style={{ maxHeight:34, width:'auto', maxWidth:132, objectFit:'contain', opacity:0.96 }} onError={() => setErr(true)} />
    </div>
  );
}

function TrustBand() {
  const doubled = [...LOGO_LIST, ...LOGO_LIST]; // seamless loop
  return (
    <div style={{ background:WHITE, borderTop:`1px solid ${BORDER}`, borderBottom:`1px solid ${BORDER}`, padding:'22px 0', overflow:'hidden' }}>
      <div style={{ display:'flex', width:'max-content', animation:'marquee 36s linear infinite' }}>
        {doubled.map((l, i) => <LogoItem key={i} name={l.name} path={l.path} />)}
      </div>
    </div>
  );
}

/* ── JOB CARD (production-like) ── */

      background:WHITE, borderRadius:8, cursor:'pointer', transition:'all 0.15s',
      border:`1px solid ${selected ? BLUE_B : BORDER}`,

      {/* Score chip */}

      <div style={{ display:'flex', flexWrap:'wrap', gap:5, marginBottom:14 }}>
        <Tag type="location">{job.location}</Tag>
        <Tag type="contract">{job.contract}</Tag>
        <Tag type="experience">{job.exp}</Tag>
        <Tag type="family">{job.family}</Tag>
      </div>

      {/* Footer: logo + company + date + buttons */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop:12, borderTop:`1px solid ${BORDER}`, marginTop:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', gap:9 }}>
          <CompanyLogo domain={job.domain} name={job.co} size={34} />
          <div>
            <div style={{ fontSize:12.5, fontWeight:600, color:MUTED }}>{job.co}</div>
            <div style={{ fontSize:11, color:'#bbb' }}>{job.date}</div>

          <div style={{ padding:'6px 12px', fontSize:11.5, fontWeight:600, color:MUTED, border:`1px solid ${BORDER}`, borderRadius:4 }}>Voir l'offre</div>

/* ── DEMO SECTION ── */
function DemoSection() {
  const [tab, setTab] = useState('offres');
  const [sel, setSel] = useState(1);
  const [lidx, setLidx] = useState(0);
  const [typing, setTyping] = useState(false);
  const ref = useReveal(80);

  useEffect(() => {
    if (tab !== 'ia') { setLidx(0); setTyping(false); return; }
    const t = setTimeout(() => { setLidx(0); setTyping(true); }, 500);
    return () => clearTimeout(t);
  }, [tab]);

  useEffect(() => {
    if (!typing || tab !== 'ia') return;
    if (lidx >= LETTER.length) { setTyping(false); return; }
    const speed = LETTER[lidx] === '\n' ? 50 : 13;
    const t = setTimeout(() => setLidx(i => i + 1), speed);
    return () => clearTimeout(t);
  }, [typing, lidx, tab]);

  const TABS = [
    { id:'offres',       label:'Parcourir les offres' },
    { id:'candidatures', label:'Mes candidatures' },
    { id:'ia',           label:'IA rédige' },
  ];

  return (
    <section id="offres" className="reveal-up" ref={ref} style={{ background:BG, padding:'100px 48px' }}>
      <div style={{ maxWidth:1260, margin:'0 auto' }}>
        <div style={{ maxWidth:640, marginBottom:52 }}>

            <div style={{ flex:1, background:'rgba(12,26,46,0.06)', borderRadius:6, height:22, marginLeft:8, display:'flex', alignItems:'center', paddingLeft:12 }}>
              <span style={{ fontSize:11, color:'#bbb' }}>app.taleos.fr/offres</span>
            </div>
          </div>

          {/* Tab bar */}
          <div style={{ display:'flex', alignItems:'center', padding:'0 24px', height:50, borderBottom:`1px solid ${BORDER}`, background:WHITE, gap:4 }}>
            <TaleosLogo size={22} />

                {/* Filter chips */}

                  {['Toutes','Envoyées','Vues','Entretiens','Refusées'].map((f,i) => (

                </div>

            )}

            {/* ── IA RÉDIGE ── */}
            {tab === 'ia' && (
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, animation:'slideDown 0.2s ease' }}>
                <div style={{ background:WHITE, border:`1px solid ${BORDER}`, borderRadius:8, padding:'20px' }}>

                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
                    <CompanyLogo domain="bnpparibas.com" name="BNP Paribas" size={40} />
                    <div>
                      <div style={{ fontSize:15, fontWeight:700, color:NAVY, lineHeight:1.25 }}>Analyste M&A</div>
                      <div style={{ fontSize:12.5, color:BLUE }}>BNP Paribas CIB · Paris 8e</div>

                    <Tag type="experience">Bac+5</Tag>
                    <Tag type="family">Banque d'investissement</Tag>
                  </div>
                  <div style={{ fontSize:13, color:MUTED, lineHeight:1.75 }}>
                    BNP Paribas CIB recherche un Analyste M&A pour son équipe Coverage & Investment Banking. Participation à l'origination et l'exécution de transactions M&A, leveraged finance et ECM pour des clients grands groupes et ETI européens.
                  </div>
                </div>
                <div style={{ background:WHITE, border:`1px solid ${BORDER}`, borderRadius:8, padding:'20px', display:'flex', flexDirection:'column' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16 }}>
                    <div style={{ width:7, height:7, borderRadius:'50%', background:BLUE, animation:'blink 1.2s infinite' }}></div>
                    <div style={{ fontSize:10.5, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:BLUE }}>IA rédige votre lettre de motivation</div>

                  <div style={{ fontSize:13, color:MUTED, lineHeight:1.85, whiteSpace:'pre-wrap', flex:1, overflowY:'auto', maxHeight:300, fontFamily:"Georgia, serif" }}>

                </div>
              </div>

          </div>
        </div>
      </div>
    </section>

}

/* ── PROCESS ── */
const STEPS = [

  { n:'03', title:'Suivez et décrochez', body:'Votre dashboard centralise tout : statuts, entretiens planifiés, relances. Vous pilotez votre recherche comme un vrai projet.' },
];

function Process() {
  const ref = useReveal();
  return (
    <section id="process" className="reveal-up" ref={ref} style={{ background:S2, padding:'100px 48px', borderTop:`1px solid ${BORDER}` }}>
      <div style={{ maxWidth:1260, margin:'0 auto' }}>
        <div style={{ marginBottom:56 }}>
          <h2 style={{ fontFamily:FH, fontSize:'clamp(2rem,3vw,3rem)', fontWeight:400, color:NAVY, letterSpacing:'-0.01em' }}>Trois étapes. Zéro friction.</h2>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:2, background:BORDER }}>

}

/* ── PRICING ── */

  { name:'Starter', monthly:0, yearly:0, desc:'Pour découvrir Taleos et tester la plateforme sans engagement.', features:['10 candidatures / mois','Accès aux 7 000+ offres','Dashboard de suivi','3 lettres IA / mois'], cta:'Commencer gratuitement', accent:false },
  { name:'Pro', monthly:9, yearly:79, desc:'Pour les candidats actifs qui veulent maximiser leurs chances.', features:['Candidatures illimitées','Lettres IA illimitées & personnalisées','Suivi multi-statuts avancé','Alertes offres en temps réel','Support email prioritaire'], cta:'Essayer Pro — 14 jours gratuits', accent:true },
  { name:'Expert', monthly:24, yearly:199, desc:'Pour les candidats sérieux avec plusieurs profils actifs.', features:['Tout Pro, plus…','3 profils CV distincts','Analytics & taux de réponse','Préparation entretiens par IA','Support chat dédié'], cta:'Essayer Expert', accent:false },
];

  const [yearly, setYearly] = useState(false);
  const ref = useReveal(80);
  return (
    <section id="tarifs" className="reveal-up" ref={ref} style={{ background:BG, padding:'100px 48px', borderTop:`1px solid ${BORDER}` }}>
      <div style={{ maxWidth:1100, margin:'0 auto' }}>
        <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:52, flexWrap:'wrap', gap:20 }}>
          <h2 style={{ fontFamily:FH, fontSize:'clamp(2rem,3.5vw,3rem)', fontWeight:400, color:NAVY, letterSpacing:'-0.01em' }}>Simple et transparent</h2>
          <div style={{ display:'inline-flex', alignItems:'center', background:WHITE, border:`1px solid ${BORDER}`, borderRadius:6, padding:'4px 5px', gap:2 }}>
            {[['Mensuel',false],['Annuel (−30%)',true]].map(([l,y]) => (
              <button key={l} onClick={() => setYearly(y)} style={{ padding:'8px 18px', borderRadius:4, border:'none', cursor:'pointer', background: yearly===y ? NAVY : 'transparent', color: yearly===y ? WHITE : MUTED, fontSize:13, fontWeight:600, transition:'all 0.2s' }}>{l}</button>

              {plan.accent && <div style={{ position:'absolute', top:-12, left:'50%', transform:'translateX(-50%)', background:BLUE, color:WHITE, padding:'4px 18px', borderRadius:20, fontSize:11, fontWeight:600, whiteSpace:'nowrap' }}>Recommandé</div>}

              <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:12 }}>
                <span style={{ fontFamily:FH, fontSize:40, fontWeight:600, color: plan.accent ? WHITE : NAVY }}>
                  {plan.monthly === 0 ? 'Gratuit' : `${yearly ? Math.round(plan.yearly/12) : plan.monthly}€`}

                {plan.monthly > 0 && <span style={{ fontSize:13, color: plan.accent ? 'rgba(255,255,255,0.55)' : MUTED }}>/mois{yearly ? ' (annuel)' : ''}</span>}

              {plan.features.map((f,i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:11, fontSize:13.5, color: plan.accent ? (f.startsWith('Tout') ? 'rgba(255,255,255,0.4)' : WHITE) : (f.startsWith('Tout') ? MUTED : NAVY) }}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ flexShrink:0 }}>
                    <path d="M2 7l4 4 6-6" stroke={plan.accent ? WHITE : BLUE} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>

      </div>
    </section>

  { q:"Que faire si je reçois une réponse d'une entreprise ?", a:"Vous recevez toutes les notifications par email et dans votre dashboard. Taleos met à jour les statuts automatiquement. Ensuite, c'est à vous de briller en entretien !" },
];

function FAQ() {
  const [open, setOpen] = useState(null);

  return (
    <section id="faq" className="reveal-up" ref={ref} style={{ background:WHITE, padding:'100px 48px', borderTop:`1px solid ${BORDER}` }}>

            <div style={{ maxHeight: open===i ? 220 : 0, overflow:'hidden', transition:'max-height 0.4s ease', fontSize:14.5, color:MUTED, lineHeight:1.82, paddingBottom: open===i ? 22 : 0 }}>{faq.a}</div>
          </div>
        ))}
      </div>

  );
}

        <h2 style={{ fontFamily:FH, fontSize:'clamp(2rem,4vw,3.5rem)', fontWeight:400, color:WHITE, letterSpacing:'-0.015em', lineHeight:1.1, marginBottom:20 }}>
          Prêt à transformer<br/><em style={{ fontStyle:'italic' }}>votre recherche d'emploi ?</em>
        </h2>
        <p style={{ fontSize:15, color:'rgba(255,255,255,0.55)', lineHeight:1.8, marginBottom:48 }}>Rejoignez des centaines d'étudiants et jeunes professionnels qui automatisent leurs candidatures en finance — gratuitement.</p>
        <button onClick={onSignup} style={{ background:WHITE, color:NAVY, border:'none', padding:'16px 44px', borderRadius:4, fontSize:14, fontWeight:700, cursor:'pointer', letterSpacing:'0.02em' }}>Commencer gratuitement</button>
        <div style={{ fontSize:12, color:'rgba(255,255,255,0.35)', marginTop:16 }}>Sans carte bancaire · Résiliable à tout moment</div>
      </div>

/* ── FOOTER ── */

  return (
    <footer style={{ background:'#070f1c', borderTop:`1px solid rgba(255,255,255,0.07)`, padding:'44px 48px' }}>

        <div style={{ display:'flex', gap:28 }}>
          {['Offres','Tarifs','CGU','Confidentialité','Contact'].map(l => (
            <span key={l} style={{ fontSize:13, color:'rgba(255,255,255,0.35)', cursor:'pointer' }}>{l}</span>

/* ── MODAL ── */
function SignupModal({ onClose }) {
  const [email, setEmail] = useState('');
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(12,26,46,0.55)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(6px)', animation:'fadeIn 0.2s ease' }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:WHITE, border:`1px solid ${BORDER}`, borderRadius:12, padding:'44px 40px', width:'100%', maxWidth:440, position:'relative', animation:'slideDown 0.25s ease', boxShadow:'0 24px 80px rgba(12,26,46,0.18)' }}>
        <button onClick={onClose} style={{ position:'absolute', top:16, right:18, background:'none', border:'none', color:MUTED, fontSize:24, cursor:'pointer', lineHeight:1 }}>×</button>
        <TaleosLogo />
        <div style={{ fontFamily:FH, fontSize:26, fontWeight:600, color:NAVY, margin:'22px 0 8px', lineHeight:1.25 }}>Créez votre compte</div>
        <div style={{ fontSize:14, color:MUTED, marginBottom:28 }}>Gratuit · Sans carte bancaire · 2 minutes. Le mot de passe et l'acceptation des CGU se font à l'étape suivante.</div>
        <input
          type="email"
          value={email}
          onChange={e => setEmail(e.target.value)}
          placeholder="Adresse email"
          style={{ width:'100%', border:`1px solid ${BORDER}`, borderRadius:4, padding:'13px 16px', marginBottom:16, fontSize:14, color:NAVY, background:'#fafaf8', outline:'none' }}
        />
        <button onClick={() => openAuth('signup', email)} style={{ width:'100%', background:NAVY, color:WHITE, border:'none', padding:'14px', borderRadius:4, fontSize:14, fontWeight:600, cursor:'pointer' }}>Continuer l'inscription →</button>
        <div style={{ fontSize:12.5, color:MUTED, textAlign:'center', marginTop:16 }}>Déjà inscrit ? <span style={{ color:NAVY, fontWeight:600, cursor:'pointer' }} onClick={() => openAuth('login', email)}>Connexion</span></div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [modal, setModal] = useState(false);
  return (
    <div>
      <Nav onSignup={() => openAuth('signup')} />
      <Hero onSignup={() => openAuth('signup')} />

      <DemoSection />

      <Pricing />
      <FAQ />
      <CTAFinal onSignup={() => openAuth('signup')} />
      <Footer />
      {modal && <SignupModal onClose={() => setModal(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
