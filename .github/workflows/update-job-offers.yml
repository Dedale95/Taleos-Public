# Mise à jour quotidienne des offres d'emploi (CA, SG, Deloitte)
# Exécution tous les jours à 6h00 (heure de Paris)
# Les fichiers JSON/CSV mis à jour sont commités et poussés automatiquement

name: Mise à jour offres quotidienne

permissions:
  contents: write  # Nécessaire pour push les fichiers mis à jour

on:
  schedule:
    # 6h00 Paris = 5h00 UTC (hiver) / 4h00 UTC (été). On utilise 5h00 UTC.
    - cron: '0 5 * * *'
  workflow_dispatch:  # Permet de lancer manuellement depuis l'onglet Actions

jobs:
  update-offers:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Les scrapeurs peuvent prendre 30-90 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: |
          pip install -r PYTHON/requirements_scrapers.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Mise à jour des offres
        run: python PYTHON/update_all_jobs.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Vérifier les changements
        id: changes
        run: |
          if git diff --quiet HTML/scraped_jobs_live.json HTML/scraped_jobs.json HTML/scraped_jobs.csv 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit et push des mises à jour
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HTML/scraped_jobs_live.json HTML/scraped_jobs.json HTML/scraped_jobs.csv
          git commit -m "chore: mise à jour quotidienne des offres (CA, SG, Deloitte)"
          git push origin main
